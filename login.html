<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Field Notes — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Barlow', sans-serif; background: #0a0a0a; color: #e0e0e0;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }
  .login-box {
    width: 90%; max-width: 340px; padding: 2.5rem 2rem; text-align: center;
    border: 1px solid #1a1a1a; background: rgba(15,15,15,0.9);
  }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.15em; color: #fff; margin-bottom: 0.2rem; }
  .sub { font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: #555; margin-bottom: 2rem; }
  input[type="password"] {
    width: 100%; padding: 0.8rem 1rem; background: #111; border: 1px solid #222;
    color: #e0e0e0; font-family: 'Barlow', sans-serif; font-size: 0.95rem;
    margin-bottom: 1rem; outline: none; transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: #c0392b; }
  button {
    width: 100%; padding: 0.8rem; background: #c0392b; border: none; color: #fff;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.15em;
    cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #e74c3c; }
  .error { color: #c0392b; font-size: 0.85rem; margin-bottom: 1rem; }
</style>
</head><body>
<div class="login-box">
  <h1>FIELD NOTES</h1>
  <div class="sub">4×5 Large Format</div>
  <!--ERROR-->
  <form method="POST" action="/login">
    <input type="password" name="password" placeholder="Password" autofocus>
    <button type="submit">ENTER</button>
  </form>
</div>
</body></html>
